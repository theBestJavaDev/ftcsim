<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnautica Abyss Engine v2.0 - Collision & Proximity Physics</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020813;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #hud {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #22d3ee;
            z-index: 10;
            pointer-events: none;
            background: rgba(2, 8, 19, 0.75);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(34, 211, 238, 0.25);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            max-width: 320px;
        }
        h1 {
            font-size: 13pt;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #e0f2fe;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 10pt;
            margin: 4px 0;
            color: #94a3b8;
        }
        .stat-val {
            color: #38bdf8;
            font-family: monospace;
            font-weight: bold;
        }
        .controls-guide {
            font-size: 8.5pt;
            color: #64748b;
            line-height: 1.5;
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background-color: rgba(34, 211, 238, 0.5);
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #020813;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #38bdf8;
            font-size: 14pt;
            letter-spacing: 5px;
            font-family: monospace;
            transition: opacity 1.2s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js](https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js)"></script>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        INITIALIZING SUBNAUTICA BIOME MAP...
    </div>
    <div id="crosshair"></div>
    <div id="canvas-container"></div>

    <div id="hud">
        <h1>PDA OS v2.0</h1>
        <div class="stat-row"><span>BIOME LOCATION:</span><span class="stat-val" id="loc-val">LOADING...</span></div>
        <div class="stat-row"><span>DEPTH CALIBRATION:</span><span class="stat-val" id="depth-val">0m</span></div>
        <div class="stat-row"><span>PROXIMITY ALERTS:</span><span class="stat-val" id="prox-val">CLEAR</span></div>
        <div class="controls-guide">
            <strong>Click Screen to Lock Mouse Look</strong><br>
            Movement: W, A, S, D<br>
            Vertical: Space (Ascend) / Shift (Descend)
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const loadingScreen = document.getElementById('loading');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010d1a);
        scene.fog = new THREE.FogExp2(0x010d1a, 0.009); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 45, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x032340, 1.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0x22d3ee, 3.0);
        sunLight.position.set(20, 150, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        // MAP RADIAL SCALING EXPANDED (600x600 size grid)
        const mapSize = 600, mapSegments = 200;
        const terrainGeo = new THREE.PlaneGeometry(mapSize, mapSize, mapSegments, mapSegments);
        terrainGeo.rotateX(-Math.PI / 2);

        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i);
            let z = pos.getZ(i);
            let y = Math.sin(x * 0.015) * Math.cos(z * 0.015) * 25;
            y += Math.sin(x * 0.04) * Math.sin(z * 0.04) * 8; 
            y += Math.cos(x * 0.08) * 2; 

            let rSq = x*x + z*z;
            if (rSq < 1600) { 
                y -= (40 - (rSq * 0.025));
            }
            pos.setY(i, y);
        }
        terrainGeo.computeVertexNormals();

        const terrainMat = new THREE.MeshStandardMaterial({
            color: 0x0c2533, roughness: 0.85, metalness: 0.2, flatShading: true
        });
        const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        terrainMesh.receiveShadow = true;
        scene.add(terrainMesh);

        // --- HARD COLLISION REGISTRATION DATA ---
        const boundingSpheres = [];    
        const collidableObjects = [];

        function sampleTerrainHeight(x, z) {
            let y = Math.sin(x * 0.015) * Math.cos(z * 0.015) * 25;
            y += Math.sin(x * 0.04) * Math.sin(z * 0.04) * 8; 
            y += Math.cos(x * 0.08) * 2;
            let rSq = x*x + z*z;
            if (rSq < 1600) y -= (40 - (rSq * 0.025));
            return y;
        }

        function createReefStructure(x, z, scaleY = 1, type = 0) {
            let geometry, material;
            if (type === 0) {
                geometry = new THREE.CylinderGeometry(3, 8, 45, 5);
                material = new THREE.MeshStandardMaterial({ color: 0x081e2b, roughness: 0.9, flatShading: true });
            } else {
                geometry = new THREE.DodecahedronGeometry(12, 1);
                material = new THREE.MeshStandardMaterial({ color: 0x0e3a47, emissive: 0x042429, roughness: 0.7, flatShading: true });
            }

            const mesh = new THREE.Mesh(geometry, material);
            mesh.scale.set(1, scaleY, 1);
            let tHeight = sampleTerrainHeight(x, z);
            mesh.position.set(x, tHeight + (type === 0 ? 22.5 * scaleY : 4), z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            collidableObjects.push(mesh);
            boundingSpheres.push({
                x: x, z: z,
                radius: type === 0 ? 8.5 : 13.5,
                topY: mesh.position.y + (type === 0 ? 22.5 * scaleY : 12),
                bottomY: tHeight
            });
        }

        // Populate world with collidable props
        for (let i = 0; i < 65; i++) {
            let angle = Math.random() * Math.PI * 2;
            let radius = 35 + Math.random() * 230;
            let x = Math.cos(angle) * radius;
            let z = Math.sin(angle) * radius;
            let type = Math.random() > 0.45 ? 0 : 1;
            let scaleY = 0.6 + Math.random() * 1.3;
            createReefStructure(x, z, scaleY, type);
        }

        // --- FIRST PERSON PHYSICS MOVEMENT CONTROLS ---
        const keys = { w: false, a: false, s: false, d: false, space: false, shift: false };
        let playerVelocity = new THREE.Vector3();
        let playerRadius = 2.2; 
        let cameraRotation = new THREE.Euler(0, 0, 0, 'YXZ');

        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                cameraRotation.y -= e.movementX * 0.002;
                cameraRotation.x -= e.movementY * 0.002;
                cameraRotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraRotation.x));
            }
        });

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') keys.w = true;
            if(e.code === 'KeyA') keys.a = true;
            if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'KeyD') keys.d = true;
            if(e.code === 'Space') keys.space = true;
            if(e.code === 'ShiftLeft') keys.shift = true;
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') keys.w = false;
            if(e.code === 'KeyA') keys.a = false;
            if(e.code === 'KeyS') keys.s = false;
            if(e.code === 'KeyD') keys.d = false;
            if(e.code === 'Space') keys.space = false;
            if(e.code === 'ShiftLeft') keys.shift = false;
        });

        function updateMovementAndPhysics() {
            camera.quaternion.setFromEuler(cameraRotation);
            
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            
            let moveDirection = new THREE.Vector3();
            if (keys.w) moveDirection.add(forward);
            if (keys.s) moveDirection.addScaledVector(forward, -1);
            if (keys.a) moveDirection.addScaledVector(right, -1);
            if (keys.d) moveDirection.addScaledVector(right, 1);
            moveDirection.normalize();
            
            let targetVelocity = moveDirection.multiplyScalar(0.5);
            playerVelocity.lerp(targetVelocity, 0.1);

            if (keys.space) playerVelocity.y += 0.03;
            if (keys.shift) playerVelocity.y -= 0.03;
            playerVelocity.y *= 0.85; 

            let nextPosition = camera.position.clone().add(playerVelocity);
            let proximityAlert = false;
            let currentFloorLimit = sampleTerrainHeight(nextPosition.x, nextPosition.z) + 3.0;

            // --- HARD GEOMETRIC COLLISION ENGINE ---
            for (let i = 0; i < boundingSpheres.length; i++) {
                let obj = boundingSpheres[i];
                let dx = nextPosition.x - obj.x;
                let dz = nextPosition.z - obj.z;
                let distXZ = Math.sqrt(dx*dx + dz*dz);
                
                // If coordinates intersect the object's physical footprint
                if (distXZ < (obj.radius + playerRadius)) {
                    // Check horizontal volume depth bounds matching object height metrics
                    if (nextPosition.y > (obj.bottomY - 1) && nextPosition.y < (obj.topY + 1)) {
                        proximityAlert = true;
                        
                        // Push mechanics: Calculate normal push matrix angles
                        let pushAngle = Math.atan2(dz, dx);
                        let overlapDist = (obj.radius + playerRadius) - distXZ;
                        
                        // Slide player out of geometric boundary space instantly
                        nextPosition.x += Math.cos(pushAngle) * overlapDist;
                        nextPosition.z += Math.sin(pushAngle) * overlapDist;
                        
                        // Terminate kinetic velocity profiles to prevent clipping or passing through
                        playerVelocity.x = 0;
                        playerVelocity.z = 0;
                    }
                }
            }

            // Floor terrain height lock verification
            if (nextPosition.y < currentFloorLimit) {
                nextPosition.y = currentFloorLimit;
                playerVelocity.y = 0;
            }
            // Sky boundary max limits ceiling
            if (nextPosition.y > 90) {
                nextPosition.y = 90;
                playerVelocity.y = 0;
            }

            camera.position.copy(nextPosition);

            // Interface text state handling
            document.getElementById('depth-val').innerText = Math.round(90 - camera.position.y) + "m";
            document.getElementById('prox-val').innerText = proximityAlert ? "IMPACT WALL IMPACT" : "PROXIMITY SECURE";
            document.getElementById('prox-val').style.color = proximityAlert ? "#f43f5e" : "#22d3ee";
            
            let biome = "GRASSY PLATEAUS";
            if(camera.position.y < 25) biome = "BLOOD KELP TRENCH";
            if(Math.sqrt(camera.position.x*camera.position.x + camera.position.z*camera.position.z) > 190) biome = "DEAD ZONE EDGE";
            document.getElementById('loc-val').innerText = biome;
        }

        // Atmospheric drifting plankton setup
        const pCount = 5000;
        const pGeo = new THREE.BufferGeometry();
        const pPositions = new Float32Array(pCount * 3);
        for(let i = 0; i < pCount * 3; i += 3) {
            pPositions[i] = (Math.random() - 0.5) * mapSize;
            pPositions[i+1] = Math.random() * 95;
            pPositions[i+2] = (Math.random() - 0.5) * mapSize;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        const pMat = new THREE.PointsMaterial({
            size: 0.35, color: 0x22d3ee, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const planktonField = new THREE.Points(pGeo, pMat);
        scene.add(planktonField);

        const clock = new THREE.Clock();
        setTimeout(() => {
            loadingScreen.style.opacity = 0;
            setTimeout(() => loadingScreen.remove(), 1200);
        }, 1500);

        function mainLoop() {
            requestAnimationFrame(mainLoop);
            updateMovementAndPhysics();

            const time = clock.getElapsedTime();
            const pArr = planktonField.geometry.attributes.position.array;
            for(let i = 1; i < pArr.length; i += 3) {
                pArr[i] -= 0.02;
                if(pArr[i] < 0) pArr[i] = 90;
            }
            planktonField.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        mainLoop();
    </script>
</body>
</html>
