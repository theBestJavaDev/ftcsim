import com.qualcomm.robotcore.eventloop.opmode.TeleOp;
import com.qualcomm.robotcore.eventloop.opmode.OpMode;
import com.qualcomm.robotcore.hardware.DcMotor;

@TeleOp(name="Mecanum Drive", group="TeleOp")
public class MecanumDrive extends OpMode {
    private DcMotor leftFront, rightFront, leftRear, rightRear;

    @Override
    public void init() {
        leftFront  = hardwareMap.get(DcMotor.class, "leftFront");
        rightFront = hardwareMap.get(DcMotor.class, "rightFront");
        leftRear   = hardwareMap.get(DcMotor.class, "leftRear");
        rightRear  = hardwareMap.get(DcMotor.class, "rightRear");

        rightFront.setDirection(DcMotor.Direction.REVERSE);
        rightRear.setDirection(DcMotor.Direction.REVERSE);

        telemetry.addData("Status", "Initialized");
        telemetry.update();
    }

    @Override
    public void loop() {
        double y  = -gamepad1.left_stick_y;   // forward/back
        double x  =  gamepad1.left_stick_x;   // strafe
        double rx =  gamepad1.right_stick_x;  // rotation

        double denominator = Math.max(Math.abs(y) + Math.abs(x) + Math.abs(rx), 1);

        double lf = (y + x + rx) / denominator;
        double rf = (y - x - rx) / denominator;
        double lr = (y - x + rx) / denominator;
        double rr = (y + x - rx) / denominator;

        leftFront.setPower(lf);
        rightFront.setPower(rf);
        leftRear.setPower(lr);
        rightRear.setPower(rr);

        telemetry.addData("LF/RF", "%.2f / %.2f", lf, rf);
        telemetry.addData("LR/RR", "%.2f / %.2f", lr, rr);
        telemetry.update();
    }
}`},TankTeleOp:{label:"Tank Drive TeleOp",code:`package org.firstinspires.ftc.teamcode;

import com.qualcomm.robotcore.eventloop.opmode.Autonomous;
import com.qualcomm.robotcore.eventloop.opmode.LinearOpMode;
import com.qualcomm.robotcore.hardware.DcMotor;

@Autonomous(name="Basic Auto", group="Linear Opmode")
public class BasicAuto extends LinearOpMode {

    @Override
    public void runOpMode() {
        DcMotor leftFront  = hardwareMap.get(DcMotor.class, "leftFront");
        DcMotor rightFront = hardwareMap.get(DcMotor.class, "rightFront");
        DcMotor leftRear   = hardwareMap.get(DcMotor.class, "leftRear");
        DcMotor rightRear  = hardwareMap.get(DcMotor.class, "rightRear");

        rightFront.setDirection(DcMotor.Direction.REVERSE);
        rightRear.setDirection(DcMotor.Direction.REVERSE);

        telemetry.addData("Status", "Initialized");
        telemetry.update();

        waitForStart();

        // Drive forward for 2 seconds
        leftFront.setPower(0.6);
        rightFront.setPower(0.6);
        leftRear.setPower(0.6);
        rightRear.setPower(0.6);
        sleep(2000);

        // Strafe right for 1 second
        leftFront.setPower(0.5);
        rightFront.setPower(-0.5);
        leftRear.setPower(-0.5);
        rightRear.setPower(0.5);
        sleep(1000);

        // Turn left for 0.5 seconds
        leftFront.setPower(-0.5);
        rightFront.setPower(0.5);
        leftRear.setPower(-0.5);
        rightRear.setPower(0.5);
        sleep(500);

        // Stop
        leftFront.setPower(0);
        rightFront.setPower(0);
        leftRear.setPower(0);
        rightRear.setPower(0);

        telemetry.addData("Status", "Complete");
        telemetry.update();
    }
}`},SquareAuto:{label:"Drive a Square",code:`package org.firstinspires.ftc.teamcode;

import com.qualcomm.robotcore.eventloop.opmode.Autonomous;
import com.qualcomm.robotcore.eventloop.opmode.LinearOpMode;
import com.qualcomm.robotcore.hardware.DcMotor;

@Autonomous(name="Square Auto", group="Linear Opmode")
public class SquareAuto extends LinearOpMode {

    DcMotor leftFront, rightFront, leftRear, rightRear;

    void setMotors(double lf, double rf, double lr, double rr) {
        leftFront.setPower(lf);
        rightFront.setPower(rf);
        leftRear.setPower(lr);
        rightRear.setPower(rr);
    }

    @Override
    public void runOpMode() {
        leftFront  = hardwareMap.get(DcMotor.class, "leftFront");
        rightFront = hardwareMap.get(DcMotor.class, "rightFront");
        leftRear   = hardwareMap.get(DcMotor.class, "leftRear");
        rightRear  = hardwareMap.get(DcMotor.class, "rightRear");

        rightFront.setDirection(DcMotor.Direction.REVERSE);
        rightRear.setDirection(DcMotor.Direction.REVERSE);

        waitForStart();

        for (int i = 0; i < 4; i++) {
            // Forward
            setMotors(0.6, 0.6, 0.6, 0.6);
            sleep(1200);

            // Turn right 90°
            setMotors(0.5, -0.5, 0.5, -0.5);
            sleep(600);
        }

        setMotors(0, 0, 0, 0);
        telemetry.addData("Status", "Square complete!");
        telemetry.update();
    }
}`},EmptyTeleOp:{label:"Empty TeleOp",code:`package org.firstinspires.ftc.teamcode;
