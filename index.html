<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnautica Deep Engine - Prototype Build</title>
    <style>
        /* --- UI & HUD CSS --- */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Loading Screen Failsafe */
        #loading { position: absolute; width: 100%; height: 100%; background: #010810; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00e5ff; font-size: 14pt; letter-spacing: 4px; font-family: monospace; transition: opacity 1s ease; }
        #loading-text { margin-top: 20px; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        #error-log { color: #ff3366; font-size: 10pt; margin-top: 15px; max-width: 80%; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(0, 229, 255, 0.1); border-top-color: #00e5ff; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Crosshair */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background-color: rgba(255, 255, 255, 0.8); border-radius: 50%; z-index: 5; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        /* Top Left PDA */
        #pda-panel { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(2, 10, 20, 0.8); padding: 15px; border-radius: 8px; border: 1px solid rgba(0, 229, 255, 0.3); backdrop-filter: blur(8px); width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { font-size: 14pt; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
        .stat { display: flex; justify-content: space-between; color: #a0aec0; font-size: 10pt; margin-bottom: 5px; }
        .stat-val { color: #00e5ff; font-family: monospace; font-weight: bold; font-size: 11pt; }
        
        /* Bottom Left Survival Meters */
        #survival-hud { position: absolute; bottom: 30px; left: 30px; z-index: 10; width: 250px; }
        .meter-container { background: rgba(0,0,0,0.6); border: 1px solid #333; height: 24px; border-radius: 12px; margin-bottom: 15px; overflow: hidden; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .meter-fill { height: 100%; transition: width 0.2s linear; }
        #o2-fill { background: linear-gradient(90deg, #0077ff, #00e5ff); width: 100%; }
        #hp-fill { background: linear-gradient(90deg, #aa0000, #ff3333); width: 100%; }
        .meter-icon { position: absolute; left: 10px; top: 2px; color: white; font-size: 10pt; font-weight: bold; font-family: sans-serif; text-shadow: 1px 1px 2px black; }
        .meter-text { position: absolute; right: 10px; top: 3px; color: white; font-size: 9pt; font-family: monospace; }

        /* Bottom Right Inventory */
        #inventory { position: absolute; bottom: 30px; right: 30px; z-index: 10; display: grid; grid-template-columns: repeat(5, 50px); gap: 8px; }
        .inv-slot { width: 50px; height: 50px; background: rgba(2, 10, 20, 0.7); border: 2px solid rgba(0, 229, 255, 0.4); border-radius: 6px; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.2); font-size: 18pt; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: border-color 0.2s; }
        .inv-slot.active { border-color: #fff; background: rgba(0, 229, 255, 0.2); }
        
        /* Warnings */
        #warning-overlay { position: absolute; top: 20%; left: 0; width: 100%; text-align: center; color: #ff3366; font-size: 24pt; font-weight: bold; letter-spacing: 3px; z-index: 20; text-shadow: 0 0 20px #ff3366; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">GENERATING WORLD TOPOGRAPHY...</div>
        <div id="error-log"></div>
    </div>
    
    <div id="crosshair"></div>
    <div id="warning-overlay">OXYGEN WARNING</div>

    <div id="pda-panel">
        <h1>PDA SYSTEM</h1>
        <div class="stat"><span>BIOME</span><span id="biome-val" class="stat-val">SAFE SHALLOWS</span></div>
        <div class="stat"><span>DEPTH</span><span id="depth-val" class="stat-val">0m</span></div>
        <div class="stat"><span>COORD X</span><span id="coord-x" class="stat-val">0</span></div>
        <div class="stat"><span>COORD Z</span><span id="coord-z" class="stat-val">0</span></div>
        <div style="margin-top:10px; font-size:8pt; color:#666;">Controls: W,A,S,D to Swim. SPACE to ascend. SHIFT to descend.</div>
    </div>

    <div id="survival-hud">
        <div class="meter-container">
            <div id="o2-fill" class="meter-fill"></div>
            <span class="meter-icon">O2</span>
            <span id="o2-text" class="meter-text">100%</span>
        </div>
        <div class="meter-container">
            <div id="hp-fill" class="meter-fill"></div>
            <span class="meter-icon">HP</span>
            <span id="hp-text" class="meter-text">100/100</span>
        </div>
    </div>

    <div id="inventory">
        <div class="inv-slot active">1</div>
        <div class="inv-slot">2</div>
        <div class="inv-slot">3</div>
        <div class="inv-slot">4</div>
        <div class="inv-slot">5</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ==========================================
        // 1. INLINE PERLIN NOISE ENGINE (For Realistic Terrain)
        // ==========================================
        const Noise = {
            permutation: [],
            init: function(seed) {
                this.permutation = new Array(256);
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = Math.floor(Math.random() * 256);
                }
                this.p = new Array(512);
                for (let i = 0; i < 512; i++) {
                    this.p[i] = this.permutation[i % 256];
                }
            },
            fade: function(t) { return t * t * t * (t * (t * 6 - 15) + 10); },
            lerp: function(t, a, b) { return a + t * (b - a); },
            grad: function(hash, x, y, z) {
                let h = hash & 15;
                let u = h < 8 ? x : y;
                let v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            },
            get: function(x, y, z) {
                let X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                let u = this.fade(x), v = this.fade(y), w = this.fade(z);
                let A = this.p[X]+Y, AA = this.p[A]+Z, AB = this.p[A+1]+Z;
                let B = this.p[X+1]+Y, BA = this.p[B]+Z, BB = this.p[B+1]+Z;
                return this.lerp(w, this.lerp(v, this.lerp(u, this.grad(this.p[AA], x, y, z), this.grad(this.p[BA], x-1, y, z)),
                               this.lerp(u, this.grad(this.p[AB], x, y-1, z), this.grad(this.p[BB], x-1, y-1, z))),
                       this.lerp(v, this.lerp(u, this.grad(this.p[AA+1], x, y, z-1), this.grad(this.p[BA+1], x-1, y, z-1)),
                               this.lerp(u, this.grad(this.p[AB+1], x, y-1, z-1), this.grad(this.p[BB+1], x-1, y-1, z-1))));
            }
        };
        Noise.init();

        try {
            // ==========================================
            // 2. SCENE & RENDERER INITIALIZATION
            // ==========================================
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            
            // Subnautica Water Fog (Cyan/Blue)
            const waterColor = new THREE.Color(0x041926);
            scene.background = waterColor;
            scene.fog = new THREE.FogExp2(waterColor, 0.007); // Dense visibility

            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 10, 0); // Start just beneath the waves

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // ==========================================
            // 3. LIGHTING (Sunlight & Bioluminescence)
            // ==========================================
            const ambientLight = new THREE.AmbientLight(0x062842, 1.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xa5f3fc, 2.5);
            sunLight.position.set(100, 200, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 10;
            sunLight.shadow.camera.far = 400;
            const d = 250;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            scene.add(sunLight);

            // ==========================================
            // 4. MASSIVE PROCEDURAL TERRAIN GENERATION
            // ==========================================
            document.getElementById('loading-text').innerText = "CALCULATING TECTONIC PLATES...";
            
            const mapSize = 1000; // 1km x 1km map
            const mapSegments = 250; // High resolution vertex grid
            const terrainGeo = new THREE.PlaneGeometry(mapSize, mapSize, mapSegments, mapSegments);
            terrainGeo.rotateX(-Math.PI / 2);

            // Complex biome math
            function getElevation(x, z) {
                // Base rolling hills (Safe Shallows)
                let y = Noise.get(x * 0.005, 0, z * 0.005) * 30;
                // Add micro-details (Sand dunes)
                y += Noise.get(x * 0.04, 0, z * 0.04) * 4;
                
                // Distance from center
                let dist = Math.sqrt(x*x + z*z);
                
                // Create massive deep trenches at the edges (Kelp Forest / Grand Reef)
                if (dist > 200) {
                    let trenchDepth = (dist - 200) * 0.4;
                    y -= trenchDepth;
                }
                
                // Floor limit
                if (y < -150) y = -150;
                return y;
            }

            const pos = terrainGeo.attributes.position;
            const colors = [];
            const colorObj = new THREE.Color();

            // Apply elevation and vertex colors based on depth (Biome Shading)
            for (let i = 0; i < pos.count; i++) {
                let x = pos.getX(i);
                let z = pos.getZ(i);
                let y = getElevation(x, z);
                pos.setY(i, y);

                // Vertex coloring logic
                if (y > -20) {
                    colorObj.setHex(0xeae0c8); // Sand
                } else if (y > -60) {
                    colorObj.setHex(0x567d46); // Greenish algae rock
                } else {
                    colorObj.setHex(0x1a2e38); // Deep dark rock
                }
                colors.push(colorObj.r, colorObj.g, colorObj.b);
            }
            
            terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            terrainGeo.computeVertexNormals();

            const terrainMat = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.9,
                metalness: 0.1,
                flatShading: true
            });
            const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
            terrainMesh.receiveShadow = true;
            scene.add(terrainMesh);

            // ==========================================
            // 5. FLORA & ENVIRONMENT PROPS (Instanced for performance)
            // ==========================================
            document.getElementById('loading-text').innerText = "PLANTING KELP FORESTS...";

            const collidableObjects = []; // For our physics engine
            
            // Build Kelp Forest
            const kelpGeo = new THREE.CylinderGeometry(0.5, 0.8, 40, 6);
            kelpGeo.translate(0, 20, 0); // Move pivot to bottom
            const kelpMat = new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.6 });
            
            for (let i = 0; i < 400; i++) {
                let x = (Math.random() - 0.5) * mapSize * 0.8;
                let z = (Math.random() - 0.5) * mapSize * 0.8;
                let y = getElevation(x, z);
                
                // Only spawn kelp in medium depths
                if (y < -20 && y > -80) {
                    let kelp = new THREE.Mesh(kelpGeo, kelpMat);
                    kelp.position.set(x, y, z);
                    kelp.rotation.y = Math.random() * Math.PI;
                    kelp.rotation.z = (Math.random() - 0.5) * 0.2; // Slight lean
                    kelp.scale.set(1, 0.5 + Math.random(), 1);
                    scene.add(kelp);
                    
                    // Add to collision checks (Simplified as cylinder)
                    collidableObjects.push({ x: x, z: z, radius: 2, top: y + (40 * kelp.scale.y), bottom: y });
                }
            }

            // Build Coral Tubes (Safe Shallows)
            const coralGeo = new THREE.TorusGeometry(3, 1, 8, 12);
            coralGeo.rotateX(Math.PI / 2);
            const coralMat = new THREE.MeshStandardMaterial({ color: 0xf43f5e, roughness: 0.8 });
            
            for (let i = 0; i < 200; i++) {
                let x = (Math.random() - 0.5) * mapSize * 0.5;
                let z = (Math.random() - 0.5) * mapSize * 0.5;
                let y = getElevation(x, z);
                
                if (y > -25) { // Only in shallows
                    let coral = new THREE.Mesh(coralGeo, coralMat);
                    coral.position.set(x, y + 1.5, z);
                    coral.rotation.x = (Math.random() - 0.5) * 0.5 + Math.PI/2;
                    coral.rotation.y = Math.random() * Math.PI;
                    coral.scale.setScalar(0.5 + Math.random());
                    scene.add(coral);
                    
                    collidableObjects.push({ x: x, z: z, radius: 3.5 * coral.scale.x, top: y + 4, bottom: y });
                }
            }

            // ==========================================
            // 6. WATER SURFACE CEILING
            // ==========================================
            const surfaceGeo = new THREE.PlaneGeometry(mapSize, mapSize);
            surfaceGeo.rotateX(-Math.PI / 2);
            const surfaceMat = new THREE.MeshStandardMaterial({
                color: 0x0284c7, transparent: true, opacity: 0.4, roughness: 0.1, metalness: 0.8
            });
            const waterSurface = new THREE.Mesh(surfaceGeo, surfaceMat);
            waterSurface.position.y = 100; // Sea Level
            scene.add(waterSurface);

            // ==========================================
            // 7. SURVIVAL & PLAYER PHYSICS ENGINE
            // ==========================================
            document.getElementById('loading-text').innerText = "INITIALIZING SURVIVAL PROTOCOLS...";

            const player = {
                velocity: new THREE.Vector3(),
                radius: 1.5,
                o2: 100,
                maxO2: 100,
                hp: 100,
                maxHp: 100,
                speed: 0.6
            };

            const keys = { w: false, a: false, s: false, d: false, space: false, shift: false };
            let cameraRotation = new THREE.Euler(0, 0, 0, 'YXZ');

            // Mouse lock
            renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
            
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    cameraRotation.y -= e.movementX * 0.002;
                    cameraRotation.x -= e.movementY * 0.002;
                    cameraRotation.x = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, cameraRotation.x));
                }
            });

            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') keys.w = true;
                if(e.code === 'KeyA') keys.a = true;
                if(e.code === 'KeyS') keys.s = true;
                if(e.code === 'KeyD') keys.d = true;
                if(e.code === 'Space') keys.space = true;
                if(e.code === 'ShiftLeft') keys.shift = true;
                // Inventory Hotkeys
                if(['Digit1','Digit2','Digit3','Digit4','Digit5'].includes(e.code)) {
                    document.querySelectorAll('.inv-slot').forEach(el => el.classList.remove('active'));
                    document.querySelectorAll('.inv-slot')[parseInt(e.key)-1].classList.add('active');
                }
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') keys.w = false;
                if(e.code === 'KeyA') keys.a = false;
                if(e.code === 'KeyS') keys.s = false;
                if(e.code === 'KeyD') keys.d = false;
                if(e.code === 'Space') keys.space = false;
                if(e.code === 'ShiftLeft') keys.shift = false;
            });

            function updatePlayer(dt) {
                // Rotation
                camera.quaternion.setFromEuler(cameraRotation);
                
                // Movement Math
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                
                let moveDir = new THREE.Vector3();
                if (keys.w) moveDir.add(forward);
                if (keys.s) moveDir.addScaledVector(forward, -1);
                if (keys.a) moveDir.addScaledVector(right, -1);
                if (keys.d) moveDir.add(right);
                moveDir.normalize();

                // Apply thrust
                let targetVel = moveDir.multiplyScalar(player.speed);
                player.velocity.lerp(targetVel, 0.1); // Water drag

                // Vertical Thrust
                if (keys.space) player.velocity.y += 0.04;
                if (keys.shift) player.velocity.y -= 0.04;
                player.velocity.y *= 0.85; // Vertical drag

                let nextPos = camera.position.clone().add(player.velocity);

                // Hard Collision Loop against Flora/Props
                for (let i = 0; i < collidableObjects.length; i++) {
                    let obj = collidableObjects[i];
                    let dx = nextPos.x - obj.x;
                    let dz = nextPos.z - obj.z;
                    let distXZ = Math.sqrt(dx*dx + dz*dz);
                    
                    if (distXZ < (obj.radius + player.radius)) {
                        if (nextPos.y > obj.bottom && nextPos.y < obj.top) {
                            let pushAngle = Math.atan2(dz, dx);
                            let overlap = (obj.radius + player.radius) - distXZ;
                            nextPos.x += Math.cos(pushAngle) * overlap;
                            nextPos.z += Math.sin(pushAngle) * overlap;
                            player.velocity.x = 0; player.velocity.z = 0;
                        }
                    }
                }

                // Terrain Floor Collision
                let groundHeight = getElevation(nextPos.x, nextPos.z) + 2; // +2 for eye level
                if (nextPos.y < groundHeight) {
                    nextPos.y = groundHeight;
                    player.velocity.y = 0;
                }

                // Surface Ceiling limit
                if (nextPos.y > 100) {
                    nextPos.y = 100;
                    player.velocity.y = 0;
                }

                camera.position.copy(nextPos);

                // --- SURVIVAL LOGIC (OXYGEN) ---
                let depth = 100 - camera.position.y;
                
                // If at surface, refill rapidly. If underwater, drain slowly.
                if (depth < 2) {
                    player.o2 = Math.min(player.maxO2, player.o2 + 20 * dt);
                } else {
                    player.o2 -= 2 * dt; // Loses 2 O2 per second
                }

                // Damage if out of O2
                if (player.o2 <= 0) {
                    player.o2 = 0;
                    player.hp -= 5 * dt; // Lose 5 HP per second drowning
                    document.getElementById('warning-overlay').style.opacity = 1;
                } else {
                    document.getElementById('warning-overlay').style.opacity = 0;
                }

                if (player.hp <= 0) {
                    // Death sequence (reset to surface)
                    camera.position.set(0, 100, 0);
                    player.hp = player.maxHp;
                    player.o2 = player.maxO2;
                }

                // Update HUD DOM
                document.getElementById('o2-fill').style.width = (player.o2 / player.maxO2 * 100) + "%";
                document.getElementById('o2-text').innerText = Math.round(player.o2) + "/100";
                
                document.getElementById('hp-fill').style.width = (player.hp / player.maxHp * 100) + "%";
                document.getElementById('hp-text').innerText = Math.round(player.hp) + "/100";

                document.getElementById('depth-val').innerText = Math.round(Math.max(0, depth)) + "m";
                document.getElementById('coord-x').innerText = Math.round(camera.position.x);
                document.getElementById('coord-z').innerText = Math.round(camera.position.z);
                
                // Biome Check
                let dist = Math.sqrt(camera.position.x**2 + camera.position.z**2);
                let biomeName = "SAFE SHALLOWS";
                if (depth > 60) biomeName = "BLOOD KELP CAVES";
                else if (dist > 200) biomeName = "CRATER EDGE (VOID)";
                else if (dist > 80) biomeName = "KELP FOREST";
                document.getElementById('biome-val').innerText = biomeName;
            }

            // ==========================================
            // 8. PLANKTON / MARINE SNOW PARTICLE SYSTEM
            // ==========================================
            const pCount = 8000;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i+=3) {
                pPos[i] = (Math.random() - 0.5) * 400; // Localized around center
                pPos[i+1] = Math.random() * 250 - 150;
                pPos[i+2] = (Math.random() - 0.5) * 400;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({ color: 0x00e5ff, size: 0.4, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
            const plankton = new THREE.Points(pGeo, pMat);
            scene.add(plankton);

            // ==========================================
            // 9. ENGINE LOOP
            // ==========================================
            const clock = new THREE.Clock();

            // SUCCESS! Remove loading screen.
            const loadingUI = document.getElementById('loading');
            loadingUI.style.opacity = 0;
            setTimeout(() => loadingUI.remove(), 1000);

            function animate() {
                requestAnimationFrame(animate);
                let dt = clock.getDelta();
                let time = clock.getElapsedTime();

                // Run Physics
                updatePlayer(dt);

                // Animate Plankton relative to camera
                plankton.position.x = camera.position.x;
                plankton.position.z = camera.position.z;
                
                const arr = plankton.geometry.attributes.position.array;
                for(let i=1; i<arr.length; i+=3) {
                    arr[i] -= 0.05; // fall speed
                    if(arr[i] < camera.position.y - 100) {
                        arr[i] = camera.position.y + 100; // loop back to top
                    }
                }
                plankton.geometry.attributes.position.needsUpdate = true;

                // Animate water surface slightly
                waterSurface.position.y = 100 + Math.sin(time) * 1.5;

                renderer.render(scene, camera);
            }

            // Handle Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start Game
            animate();

        } catch (error) {
            // FAILSAFE: If WebGL or Math fails, show exact error on screen.
            document.getElementById('loading-text').innerText = "SYSTEM FAILURE";
            document.getElementById('loading-text').style.color = "#ff3366";
            document.getElementById('error-log').innerText = error.message + "\n\n(Make sure your browser supports WebGL and has hardware acceleration enabled)";
        }
    </script>
</body>
</html>
