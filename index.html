<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematical Geometry Harmonograph</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070f;
            font-family: monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .ui-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(5, 7, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 15px;
            border-radius: 6px;
            color: #38bdf8;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }
        h2 {
            font-size: 11pt;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .equation {
            font-size: 9pt;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <canvas id="geoCanvas"></canvas>

    <div class="ui-panel">
        <h2>Geometric Harmonograph</h2>
        <div class="equation" id="eqX">x = sin(a·t + p1) + sin(b·t + p2)</div>
        <div class="equation" id="eqY">y = cos(c·t + p3) + cos(d·t + p4)</div>
    </div>

    <script>
        const canvas = document.getElementById('geoCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Mathematical frequencies for wave interference ratios
        let freqA = 2.01;
        let freqB = 3.00;
        let freqC = 5.01;
        let freqD = 1.00;

        // Phase shifts that mutate dynamically over time
        let phase1 = 0;
        let phase2 = Math.PI / 2;
        let phase3 = Math.PI;
        let phase4 = 0;

        let timeOffset = 0;

        function animate() {
            // Semi-transparent background clear produces beautiful geometric trailing vectors
            ctx.fillStyle = 'rgba(5, 7, 15, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Scaler coordinates based on screen dimension bounds
            const maxRadius = Math.min(centerX, centerY) * 0.45;

            // Mutate mathematical phase over time loops to shift geometry patterns smoothly
            timeOffset += 0.002;
            phase1 = Math.sin(timeOffset * 0.5) * Math.PI;
            phase2 = Math.cos(timeOffset * 0.3) * Math.PI;
            phase3 = Math.sin(timeOffset * 0.2) * Math.PI;

            // Color spectrum variables cycling dynamically via trig frequencies
            let hue = (timeOffset * 20) % 360;
            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
            ctx.lineWidth = 1.5;

            ctx.beginPath();

            // Intersect 1200 high-resolution geometric calculation steps per animation frame
            for (let i = 0; i < 1200; i++) {
                let t = (i * 0.05);

                // Four-point matrix wave synthesis algorithm (Chladni / Harmonograph physics formulas)
                let x = Math.sin(freqA * t + phase1) * 0.6 + Math.sin(freqB * t + phase2) * 0.4;
                let y = Math.cos(freqC * t + phase3) * 0.6 + Math.cos(freqD * t + phase4) * 0.4;

                // Map mathematical floats directly to screen canvas vector geometry
                let screenX = centerX + x * maxRadius;
                let screenY = centerY + y * maxRadius;

                if (i === 0) {
                    ctx.moveTo(screenX, screenY);
                } else {
                    ctx.lineTo(screenX, screenY);
                }
            }

            ctx.shadowBlur = 4;
            ctx.shadowColor = `hsla(${hue}, 80%, 60%, 0.3)`;
            ctx.stroke();
            ctx.shadowBlur = 0; // Reset canvas filter overhead

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
