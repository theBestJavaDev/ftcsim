<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Random Bezier Curves</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            color: #f8fafc;
            z-index: 10;
            pointer-events: auto;
            max-width: 300px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 14pt;
            margin-bottom: 8px;
            font-weight: 600;
            color: #38bdf8;
        }
        p {
            font-size: 10pt;
            color: #94a3b8;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        .legend {
            font-size: 9pt;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 12px;
            align-items: center;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-start { background-color: #4ade80; }
        .dot-cp1 { background-color: #f43f5e; }
        .dot-cp2 { background-color: #a855f7; }
        .dot-end { background-color: #f59e0b; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>Bezier Canvas</h1>
        <p>Constantly morphing cubic Bézier curves with visible tracking vectors and control handles.</p>
        <div class="legend">
            <span class="dot dot-start"></span> <span>Start Point (P0)</span>
            <span class="dot dot-cp1"></span> <span>Control Point 1 (P1)</span>
            <span class="dot dot-cp2"></span> <span>Control Point 2 (P2)</span>
            <span class="dot dot-end"></span> <span>End Point (P3)</span>
        </div>
    </div>

    <canvas id="bezierCanvas"></canvas>

    <script>
        const canvas = document.getElementById('bezierCanvas');
        const ctx = canvas.getContext('2d');

        // Set high-DPI canvas backing scale if needed
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Helper function to generate a point with target destinations for smooth interpolation
        function createPoint() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            return {
                x: x,
                y: y,
                targetX: x,
                targetY: y,
                vx: 0,
                vy: 0,
                speed: 0.01 + Math.random() * 0.02
            };
        }

        // Generate coordinates for a single Cubic Bezier curve (4 points)
        const curve = {
            p0: createPoint(), // Start
            p1: createPoint(), // Control 1
            p2: createPoint(), // Control 2
            p3: createPoint()  // End
        };

        // Update point positions towards a random destination
        function updatePoint(p) {
            // If close to destination, pick a new random target
            const dx = p.targetX - p.x;
            const dy = p.targetY - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 10) {
                p.targetX = Math.random() * canvas.width;
                p.targetY = Math.random() * canvas.height;
                p.speed = 0.005 + Math.random() * 0.015; // randomize speed slightly each turn
            }

            // Smooth interpolation (easing)
            p.x += dx * p.speed;
            p.y += dy * p.speed;
        }

        function drawNode(p, label, color) {
            // Draw handle circle
            ctx.beginPath();
            ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.fill();
            ctx.shadowBlur = 0; // reset shadow

            ctx.beginPath();
            ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Label text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '10px monospace';
            ctx.fillText(label, p.x + 12, p.y + 4);
        }

        function animate() {
            // Clear screen with a slight alpha trail effect for smooth motion blur
            ctx.fillStyle = 'rgba(15, 23, 42, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update all points
            updatePoint(curve.p0);
            updatePoint(curve.p1);
            updatePoint(curve.p2);
            updatePoint(curve.p3);

            // Draw vector guide lines connecting points to control handles
            ctx.beginPath();
            ctx.moveTo(curve.p0.x, curve.p0.y);
            ctx.lineTo(curve.p1.x, curve.p1.y);
            ctx.strokeStyle = 'rgba(244, 63, 94, 0.25)'; // Line to CP1
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(curve.p3.x, curve.p3.y);
            ctx.lineTo(curve.p2.x, curve.p2.y);
            ctx.strokeStyle = 'rgba(168, 85, 247, 0.25)'; // Line to CP2
            ctx.stroke();
            ctx.setLineDash([]); // Reset line dash

            // Draw the actual Bezier curve
            ctx.beginPath();
            ctx.moveTo(curve.p0.x, curve.p0.y);
            ctx.bezierCurveTo(
                curve.p1.x, curve.p1.y,
                curve.p2.x, curve.p2.y,
                curve.p3.x, curve.p3.y
            );
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#38bdf8';
            ctx.stroke();
            ctx.shadowBlur = 0; // Reset glow

            // Draw the point nodes on top
            drawNode(curve.p0, 'P0 (Start)', '#4ade80');
            drawNode(curve.p1, 'P1 (Control 1)', '#f43f5e');
            drawNode(curve.p2, 'P2 (Control 2)', '#a855f7');
            drawNode(curve.p3, 'P3 (End)', '#f59e0b');

            requestAnimationFrame(animate);
        }

        // Start animation loop
        animate();
    </script>
</body>
</html>
